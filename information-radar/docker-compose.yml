services:
  # ===== B站 / 通用 RSS 桥接 =====
  rsshub:
    image: diygod/rsshub:latest
    container_name: radar-rsshub
    restart: unless-stopped
    environment:
      - TZ=Asia/Shanghai
      - HTTP_PROXY=${HTTP_PROXY:-}
      - HTTPS_PROXY=${HTTPS_PROXY:-}
    ports:
      - "1200:1200"
    volumes:
      - ./data/rsshub:/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:1200/"]
      interval: 60s
      timeout: 10s
      retries: 3

  # ===== 微信公众号 RSS（WeWe-RSS）=====
  wechat-mp-rss:
    image: cooderl/wewe-rss:latest
    container_name: radar-wewe-rss
    restart: unless-stopped
    environment:
      - TZ=Asia/Shanghai
      - DB_TYPE=sqlite
    ports:
      - "4000:4000"
    volumes:
      - ./data/wewe:/app/data

  # ===== FreshRSS 全文归档 =====
  freshrss:
    image: freshrss/freshrss:latest
    container_name: radar-freshrss
    restart: unless-stopped
    environment:
      - TZ=Asia/Shanghai
      - CRON_MIN=*/15
    ports:
      - "8280:80"
    volumes:
      - ./data/freshrss:/var/www/FreshRSS/data
      - ./data/freshrss-extensions:/var/www/FreshRSS/extensions
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/"]
      interval: 60s
      timeout: 10s
      retries: 3

  # ===== Paper Bridge：自研管线 =====
  paper-bridge:
    build: .
    container_name: radar-paper-bridge
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - TZ=Asia/Shanghai
      - RSSHUB_URL=http://rsshub:1200
      - WEWE_RSS_URL=http://wechat-mp-rss:4000
      - FRESHRSS_URL=http://freshrss:80
    depends_on:
      - rsshub
      - wechat-mp-rss
      - freshrss
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./config:/app/config
    command: ["cron"]
