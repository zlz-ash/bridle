    real_repository: 6
    real_pr: 5
    executable_benchmark: 4
    public_code: 4
    public_dataset: 3
    cost_analysis: 3
    failure_analysis: 3
  reproducibility:
    has_dockerfile: 3
    has_reproduction_script: 3
    has_data_release: 2

timeliness:
  within_30_days: 10
  within_90_days: 7
  within_180_days: 4
  within_365_days: 2
  older: 0
