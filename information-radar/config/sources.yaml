# ===== 信息雷达来源清单 =====
# 排除抖音（按方案明确要求，不接入任何抖音来源）。

# ---- 工程博客 RSS ----
# 注：GitHub Engineering / Uber / Anthropic / Meta AI 的 RSS 已失效（404/406），
#     移除以避免每次运行报错。后续找到有效 RSS 再加回。
blogs:
  - name: "Netflix TechBlog"
    url: "https://netflixtechblog.com/feed"
    category: engineering
  - name: "Stripe Blog"
    url: "https://stripe.com/blog/feed.rss"
    category: engineering
  - name: "Cloudflare Blog"
    url: "https://blog.cloudflare.com/rss/"
    category: engineering
  - name: "OpenAI Research"
    url: "https://openai.com/blog/rss.xml"
    category: ai
  - name: "Google Research Blog"
    url: "https://research.google/blog/rss/"
    category: ai
  - name: "DeepMind Blog"
    url: "https://deepmind.google/blog/rss.xml"
    category: ai

# ---- B站账号（经 RSSHub 桥接）----
# url 模板：{rsshub}/bilibili/user/dynamic/{uid}
bilibili:
  - name: "示例UP主"
    uid: "12345678"
    category: tech

# ---- 微信公众号（经 WeWe-RSS 桥接）----
wechat_mp:
  - name: "示例公众号"
    feed_id: "replace-me"
    category: tech

# ---- 论文来源（Paper Bridge 自研）----
papers:
  arxiv:
    categories:
      - cs.SE
      - cs.AI
      - cs.CL
    keywords:
      - "coding agent"
      - "code generation"
      - "bug fixing"
      - "issue resolution"
      - "test generation"
      - "code review"
      - "fault localization"
      - "software maintenance"
      - "dependency upgrade"
      - "CI/CD"
      - "agent tool use"
      - "context management"
      - "agent memory"
      - "agent planning"
      - "human-AI collaboration"
      - "developer study"
      - "repository-level"
      - "pull request"
    max_results_per_category: 50

  crossref:
    venues:
      - "ICSE"
      - "FSE"
      - "ASE"
      - "MSR"
    days_back: 365
    max_results_per_venue: 30

  semantic_scholar:
    queries:
      - "repository-level coding agent"
      - "LLM agent software engineering"
      - "autonomous bug fixing agent"
      - "test generation LLM"
      - "code review automation"
    fields: ["title", "abstract", "authors", "venue", "year", "externalIds", "openAccessPdf", "url"]
    max_results_per_query: 30
    days_back: 365

# ---- 排除规则（确定性过滤）----
exclude:
  title_contains:
    - "toy programming"
    - "benchmark leaderboard only"
  abstract_contains_any:
    - "purely conceptual"
    - "no implementation"
    - "role-play only"
    - "subjective rating only"
  source_blacklist:
    - "douyin"
    - "tiktok"
